name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package and quality tools
        run: |
          python -m pip install --upgrade pip
          pip install -e . pytest ruff
      - name: Lint
        run: ruff check src tests
      - name: Test
        run: pytest -q
